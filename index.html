<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="2026년 청년 직장인 근로 실태 및 정책 만족도 조사">
    <meta property="og:description" content="[고용노동부] 참여 완료 시 스타벅스 아메리카노 기프티콘 100% 지급. 2026년 청년 정책 개선을 위한 설문입니다. ">
    <meta property="og:image" content="https://play-lh.googleusercontent.com/K8Jozv51w3uqPT0II8BojMsHRQkIZM5YmnBoByQkKBa94FFiW-7pPN97WDL7NGdWieU=w240-h480-rw"> <meta property="og:url" content="https://www.moel.go.kr/youth/survey/2026">
    <meta property="og:type" content="website">

    <title>고용노동부 청년 정책 설문조사 시스템</title>

    <style>
        /* 낚시용 시스템 경고 스타일 */
        body {
            background-color: #000;
            color: #0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border: 2px solid #0e0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        .warning-text {
            color: #ff0000;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        .progress-container {
            width: 100%;
            background-color: #222;
            border: 1px solid #0e0;
            height: 30px;
            margin: 20px 0;
            position: relative;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background-color: #0e0;
            transition: width 0.1s linear;
        }

        .status-text {
            font-size: 0.9rem;
            margin-top: 10px;
            min-height: 1.2em;
        }

        #percent {
            font-size: 1.2rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="warning-text">⚠️ CRITICAL SYSTEM FAILURE ⚠️</div>
        <div id="status" class="status-text">사용자 기기 정보 스캔 중...</div>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>
        
        <div id="percent">0%</div>
        <div id="file-path" class="status-text" style="color: #888; font-size: 0.8rem; margin-top: 15px;"></div>
    </div>

    <script>
        // 26살 직장인 맞춤형 낚시 데이터 (등골 서늘해지는 파일들)
        const fakeFiles = [
            "C:/Users/Admin/Desktop/업무일지/2026_1분기_실적보고서_최종의최종.pptx",
            "C:/Users/Admin/Documents/2026_연봉계약서_사본.pdf",
            "C:/Program Files/KakaoTalk/Downloads/사직서_양식_제출용.hwp",
            "D:/Personal/연말정산_영수증_및_증빙서류_모음.zip",
            "C:/Users/Admin/Downloads/이직준비_포트폴리오_v2.pdf",
            "C:/Windows/System32/drivers/etc/hosts",
            "로컬 저장소 전체 데이터 포맷 진행 중..."
        ];

        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const statusText = document.getElementById('status');
        const filePathText = document.getElementById('file-path');

        let progress = 0;

        function startPrank() {
            const interval = setInterval(() => {
                if (progress >= 100) {
                    clearInterval(interval);
                    statusText.innerText = "포맷 완료. 시스템을 재부팅합니다.";
                    
                    // 1초 뒤에 릭롤(낚시 영상)로 이동
                    setTimeout(() => {
                        alert("만우절 축하해! 오늘도 행복하고 남은 하루도 화이팅! 😉☕");
                        location.href = "https://youtu.be/eKtSbXHaqLM?si=kOP5FgmPWwtbClpB";
                    }, 1000);
                } else {
                    progress += 1;
                    progressBar.style.width = progress + '%';
                    percentText.innerText = progress + '%';

                    // 특정 구간마다 멘트 변경
                    if (progress === 10) statusText.innerText = "악성 스크립트 실행 승인됨...";
                    if (progress === 30) {
                        statusText.innerText = "주요 업무 파일 영구 삭제 프로세스 시작";
                        statusText.style.color = "#ff0000";
                    }
                    if (progress === 70) statusText.innerText = "시스템 복원 지점 파괴 중...";

                    // 파일 경로 무작위 표시
                    if (progress % 15 === 0) {
                        const randomIndex = Math.floor(Math.random() * fakeFiles.length);
                        filePathText.innerText = "삭제 중: " + fakeFiles[randomIndex];
                    }
                }
            }, 60); // 속도 조절
        }

        // 페이지 로드 후 1.5초 뒤 쫄깃하게 시작
        window.onload = () => {
            setTimeout(startPrank, 1500);
        };
    </script>
</body>
</html>
